version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: my-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: predictions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ${DOCKERHUB_USERNAME}/nocodb-custom:${IMAGE_TAG}
    container_name: noco
    ports:
      - "8080:8080"
    volumes:
      - ./nocodb:/usr/app/data/
    restart: unless-stopped
    environment:
      NC_ADMIN_EMAIL: admin@example.com
      NC_ADMIN_PASSWORD: 12341234

volumes:
  postgres_data:
