name: Build & Push (PR to develop)

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: write # needed for gh-pages

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-22.04
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nocodb-custom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install rsync (script uses it)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Set IMAGE_TAG (global)
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short "$GITHUB_SHA")
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}-$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build local image (nocodb-local)
        run: |
          pwd && ls -la
          if [ -f ./build-local-docker-image.sh ]; then
            bash ./build-local-docker-image.sh
          else
            bash ./nocodb/build-local-docker-image.sh
          fi

      - name: Docker login
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & push
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          docker tag nocodb-local "$IMAGE:$IMAGE_TAG"
          docker tag nocodb-local "$IMAGE:pr-${{ github.event.pull_request.number }}"
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:pr-${{ github.event.pull_request.number }}"

      - name: Install Allure CLI
        run: npm i -g allure-commandline@2.29.0 --no-audit --no-fund

      - name: Generate Allure report (with image tag)
        run: |
          mkdir -p ./allure-results
          echo "imageTag=$IMAGE_TAG" >> ./allure-results/environment.properties
          # If your tests generate allure-results, remove the placeholder below
          if [ ! -d ./allure-results || -z "$(ls -A ./allure-results)" ]; then
            mkdir -p ./allure-results && echo "No results yet" > ./allure-results/README.txt
          fi
          allure generate ./allure-results --clean -o ./allure-report

      - name: Publish Allure report to GitHub Pages
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
