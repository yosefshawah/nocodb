name: Build & Push (PR to develop)

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-22.04
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nocodb-custom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install rsync (script uses it)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la nocodb || true

      - name: Build local image (nocodb-local)
        run: bash ./build-local-docker-image.sh

      - name: Docker login
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag, push and set IMAGE_TAG (timestamp)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          TS=$(date -u +%Y%m%d%H%M%S)
          PR=${{ github.event.pull_request.number }}
          TAG="pr-$PR-$TS"

          docker tag nocodb-local $IMAGE:$TAG
          docker push $IMAGE:$TAG

          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Prepare remote directory
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app

      - name: Reset EC2 workspace and prune Docker
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf ~/app || true
            mkdir -p ~/app
            docker system prune -af --volumes || true

      - name: Sync deploy folder to EC2
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/**"
          target: "~/app"
          overwrite: true
          strip_components: 1

      - name: Deploy to EC2
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app

            # Determine docker compose command (v2 plugin or legacy)
            if docker compose version >/dev/null 2>&1; then
              DCMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DCMD="docker-compose"
            else
              echo "Docker Compose not found. Please install docker compose v2 or docker-compose." >&2
              exit 1
            fi

            # Best-effort compose down (workspace already cleaned and Docker pruned)
            $DCMD down || true

            # Create .env for compose
            cat > .env << EOF
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Pull and start
            $DCMD pull
            $DCMD up -d

            # Wait for service to be reachable (max ~60s)
            for i in $(seq 1 30); do
              if curl -sSf -o /dev/null http://localhost:8080/; then
                echo "Service is up"
                break
              fi
              echo "Waiting for service... ($i)"
              sleep 2
            done
            # Final check
            curl -sSf http://localhost:8080/ >/dev/null

      - name: Wait for service from GitHub runner
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://${{ secrets.EC2_HOST }}:8080/; then
              echo "Remote service is up"
              exit 0
            fi
            echo "Waiting for remote service... ($i)"
            sleep 2
          done
          echo "Service did not become ready in time" >&2
          exit 1

      - name: Set up Python
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          pip install -r yosef-code/requirements.txt
          pip install allure-pytest

      - name: Run API tests (pytest) with Allure
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          NOCODB_URL: http://${{ secrets.EC2_HOST }}:8080/
        run: pytest -q yosef-code/tests --alluredir=allure-results

      - name: Add Allure environment.properties
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties <<EOF
          ENVIRONMENT=PR-${{ github.event.pull_request.number }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          NOCODB_URL=http://${{ secrets.EC2_HOST }}:8080/
          EOF

      - name: Generate Allure report
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure artifacts
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            allure-results/**
            allure-report/**
