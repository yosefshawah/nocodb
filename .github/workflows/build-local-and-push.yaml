name: Build & Push (PR to develop)

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nocodb-custom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install rsync (script uses it)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la nocodb || true

      - name: Build local image (nocodb-local)
        run: bash ./build-local-docker-image.sh

      - name: Docker login
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag, push and set IMAGE_TAG (timestamp)
        id: tag
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          TS=$(date -u +%Y%m%d%H%M%S)
          PR=${{ github.event.pull_request.number }}
          TAG="pr-$PR-$TS"
          docker tag nocodb-local $IMAGE:$TAG
          docker push $IMAGE:$TAG
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

  deploy-to-ec2:
    runs-on: ubuntu-22.04
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Deploy to EC2
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            if docker compose version >/dev/null 2>&1; then
              DCMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DCMD="docker-compose"
            else
              echo "Docker Compose not found. Please install docker compose v2 or docker-compose." >&2
              exit 1
            fi
            $DCMD down || true
            cat > .env << EOF
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Ensure snapshot exists on EC2
            mkdir -p nocodb
            if [ ! -f nocodb/noco.db.bak ] && [ -f nocodb/noco.db ]; then
              cp -f nocodb/noco.db nocodb/noco.db.bak
              echo "Created snapshot from current DB."
            fi

            $DCMD pull
            $DCMD up -d
            for i in $(seq 1 30); do
              if curl -sSf -o /dev/null http://localhost:8080/; then
                echo "Service is up"
                break
              fi
              echo "Waiting for service... ($i)"
              sleep 2
            done
            curl -sSf http://localhost:8080/ >/dev/null

      - name: Wait for service from GitHub runner
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://${{ secrets.EC2_HOST }}:8080/; then
              echo "Remote service is up"
              exit 0
            fi
            echo "Waiting for remote service... ($i)"
            sleep 2
          done
          echo "Service did not become ready in time" >&2
          exit 1

  api-tests:
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install -r yosef-code/requirements.txt
          pip install allure-pytest

      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan ec2-52-18-93-49.eu-west-1.compute.amazonaws.com >> ~/.ssh/known_hosts

      - name: Run tests (pytest with Allure)
        env:
          HOST: ec2-52-18-93-49.eu-west-1.compute.amazonaws.com
          KEY_FILE: ${{ github.workspace }}/ec2_key.pem
          NOCODB_URL: http://${{ secrets.EC2_HOST }}:8080/
        run: |
          pytest -vv -s yosef-code/tests --alluredir=allure-results

      - name: Upload raw Allure results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-raw
          path: allure-results/**

  allure-report:
    runs-on: ubuntu-22.04
    needs: api-tests
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: allure-results-raw
          path: allure-results

      - name: Create Allure environment.properties
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties <<EOF
          ENVIRONMENT=PR-${{ github.event.pull_request.number }}
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          NOCODB_URL=http://${{ secrets.EC2_HOST }}:8080/
          EOF

      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report || echo "No results to generate"

      - name: Upload Allure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            allure-results/**
            allure-report/**

      - name: Upload Allure report to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-allure-pages:
    runs-on: ubuntu-22.04
    needs: allure-report
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
