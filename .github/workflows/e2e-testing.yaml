name: E2E Tests

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test against"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - development
          - production
      test_suite:
        description: "Which tests to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - api-only
          - ui-only
      skip_deployment:
        description: "Skip deployment and use existing instance"
        required: false
        default: false
        type: boolean
      debug_mode:
        description: "Enable debug mode for tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('manual-{0}-{1}', github.ref_name, github.run_id) }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nocodb-custom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install rsync (script uses it)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la nocodb || true

      - name: Build local image (nocodb-local)
        run: bash ./build-local-docker-image.sh

      - name: Docker login
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag, push and set IMAGE_TAG (timestamp)
        id: tag
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -e
          TS=$(date -u +%Y%m%d%H%M%S)
          PR=${{ github.event.pull_request.number }}
          TAG="pr-$PR-$TS"

          echo "Looking for built image 'nocodb-local'..."
          docker images | grep -E '^nocodb-local\s' || true

          IMAGE_ID=$(docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | awk '$1 ~ /^nocodb-local(:|$)/ {print $2; exit}')
          if [ -z "$IMAGE_ID" ]; then
            echo "ERROR: nocodb-local image not found. Available images:"
            docker images
            exit 1
          fi

          echo "Tagging image ID $IMAGE_ID as $IMAGE:$TAG"
          docker tag "$IMAGE_ID" "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG"
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

  deploy-to-ec2:
    runs-on: ubuntu-22.04
    needs: build-and-push
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.skip_deployment) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Deploy to EC2
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            if docker compose version >/dev/null 2>&1; then
              DCMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DCMD="docker-compose"
            else
              echo "Docker Compose not found. Please install docker compose v2 or docker-compose." >&2
              exit 1
            fi
            $DCMD down || true

            # Clean up Docker resources
            docker system prune -a -f --volumes

            cat > .env << EOF
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Ensure snapshot exists on EC2
            mkdir -p nocodb
            if [ ! -f nocodb/noco.db.bak ] && [ -f nocodb/noco.db ]; then
              cp -f nocodb/noco.db nocodb/noco.db.bak
              echo "Created snapshot from current DB."
            fi

            $DCMD pull
            $DCMD up -d
            for i in $(seq 1 30); do
              if curl -sSf -o /dev/null http://localhost:8080/; then
                echo "Service is up"
                break
              fi
              echo "Waiting for service... ($i)"
              sleep 2
            done
            curl -sSf http://localhost:8080/ >/dev/null

      - name: Wait for service from GitHub runner
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://${{ secrets.EC2_HOST }}:8080/; then
              echo "Remote service is up"
              exit 0
            fi
            echo "Waiting for remote service... ($i)"
            sleep 2
          done
          echo "Service did not become ready in time" >&2
          exit 1

  api-tests:
    runs-on: ubuntu-latest
    needs: [deploy-to-ec2, build-and-push]
    if: ${{ always() && !cancelled() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_suite == 'both' || github.event.inputs.test_suite == 'api-only'))) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install -r yosef-code/requirements.txt
          pip install allure-pytest

      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan ec2-52-18-93-49.eu-west-1.compute.amazonaws.com >> ~/.ssh/known_hosts

      - name: Run tests (pytest with Allure)
        env:
          HOST: ec2-52-18-93-49.eu-west-1.compute.amazonaws.com
          KEY_FILE: ${{ github.workspace }}/ec2_key.pem
          NOCODB_URL: http://${{ secrets.EC2_HOST }}:8080/
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          pytest -vv -s yosef-code/tests --alluredir=allure-results

      - name: Upload raw Allure results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/**

  ui-tests:
    runs-on: ubuntu-latest
    needs: [api-tests, deploy-to-ec2, build-and-push]
    if: ${{ always() && !cancelled() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_suite == 'both' || github.event.inputs.test_suite == 'ui-only'))) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Fetch only the latest commit to speed up the checkout process
          repository: yosefshawah/nocodb-UI-testing # Replace with your UI testing repo
          token: ${{ secrets.GITHUB_TOKEN }} # Use the token to access the repo

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan ec2-52-18-93-49.eu-west-1.compute.amazonaws.com >> ~/.ssh/known_hosts

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt update
          sudo apt install -y wget unzip xvfb libxi6 libgbm-dev libnss3 libxshmfence1 libasound2t64

          # Download and install latest stable Google Chrome
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

          # Get Chrome version number like "139.0.7258.66"
          CHROME_VERSION=$(google-chrome --version | grep -oP "\d+\.\d+\.\d+\.\d+")

          # Download matching ChromeDriver from official "chrome-for-testing" bucket (preferred)
          wget -q -O chromedriver.zip "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"

          # Unzip ChromeDriver, then move binary correctly (handles folder name)
          unzip chromedriver.zip
          mv */chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

          # Clean up
          rm -rf chromedriver.zip google-chrome-stable_current_amd64.deb

          # Create temporary directories for Chrome user data
          mkdir -p /tmp/chrome-user-data
          chmod 755 /tmp/chrome-user-data

      - name: Cleanup existing Chrome processes
        run: |
          # Kill any existing Chrome processes
          pkill -f chrome || true
          pkill -f chromedriver || true
          # Clean up any existing user data directories
          rm -rf /tmp/chrome-user-data-* || true

      - name: Run Selenium tests
        env:
          HEADLESS: true
          HOST: ec2-52-18-93-49.eu-west-1.compute.amazonaws.com
          KEY_FILE: ${{ github.workspace }}/ec2_key.pem
          NOCODB_URL: http://${{ secrets.EC2_HOST }}:8080/
          DISPLAY: :99
        run: |
          # Start Xvfb for headless display
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 2  # Give Xvfb time to start

          # Run tests with proper cleanup and Allure reporting
          pytest tests/ -v --tb=short --alluredir=allure-results

          # Cleanup Chrome processes and user data
          pkill -f chrome || true
          pkill -f chromedriver || true
          rm -rf /tmp/chrome-user-data-* || true

      - name: Upload raw Allure results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/**

  allure-report:
    runs-on: ubuntu-22.04
    needs: [api-tests, ui-tests, build-and-push]
    if: always()
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag || 'manual-run' }}
      NOCODB_URL: http://${{ secrets.EC2_HOST }}:8080/
      TEST_ENVIRONMENT: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number) || format('{0}', github.event.inputs.environment || 'Manual') }}
    steps:
      - name: Download API test results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: ./artifacts/allure-results-api
        continue-on-error: true

      - name: Download UI test results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: ./artifacts/allure-results-ui
        continue-on-error: true

      - name: Combine and prepare Allure results
        run: |
          mkdir -p allure-results

          # Create global environment properties
          cat > allure-results/environment.properties << EOF
          Test.Framework=Pytest+API+Selenium
          CI.Platform=GitHub Actions
          Test.Types=API Testing, UI Automation
          Browsers=Chrome (Headless)
          Target.URL=${{ env.NOCODB_URL }}
          NocoDB.Image=${{ secrets.DOCKERHUB_USERNAME }}/nocodb-custom:${{ env.IMAGE_TAG }}
          Environment=${{ env.TEST_ENVIRONMENT }}
          GitHub.Run.ID=${{ github.run_id }}
          GitHub.Actor=${{ github.actor }}
          Workflow.Trigger=${{ github.event_name }}
          Branch=${{ github.head_ref || github.ref_name }}
          Commit.SHA=${{ github.sha }}
          Repository=${{ github.repository }}
          Timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF

          # Check if artifacts directory exists and has content
          if [ -d "./artifacts" ] && [ "$(ls -A ./artifacts)" ]; then
            echo "Found artifacts, merging..."
            
            # Use a counter for truly unique filenames
            counter=1
            
            for dir in ./artifacts/allure-results-*; do
              if [ -d "$dir" ]; then
                echo "Processing $dir"
                
                # Extract test type from directory name
                test_type=$(basename "$dir" | sed 's/allure-results-//')
                echo "Test type: $test_type"
                
                # Copy all files directly, but with unique names to avoid overwrites
                for file in "$dir"/*; do
                  if [ -f "$file" ]; then
                    filename=$(basename "$file")
                    extension="${filename##*.}"
                    basename_no_ext="${filename%.*}"
                    
                    # Create unique filename: original-name-testtype-counter.extension
                    if [ "$filename" = "environment.properties" ]; then
                      # Skip individual environment.properties files (we have a global one)
                      continue
                    else
                      unique_filename="${basename_no_ext}-${test_type}-${counter}.${extension}"
                    fi
                    
                    cp "$file" "allure-results/${unique_filename}" 2>/dev/null || echo "Could not copy $file"
                    echo "Copied $filename as $unique_filename"
                  fi
                done
                
                counter=$((counter + 1))
              fi
            done
            
            # Show what we have
            echo "Final allure-results contents:"
            ls -la allure-results/
            echo "JSON files count:"
            ls -1 allure-results/*.json 2>/dev/null | wc -l
            
          else
            echo "No artifacts found, creating empty results directory"
            touch allure-results/.gitkeep
          fi

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "microsoft"
          java-version: "17"

      - name: Setup Allure
        run: |
          wget -q -L https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz -O allure-2.25.0.tgz
          sudo tar -xzf allure-2.25.0.tgz -C /opt/
          sudo ln -sf /opt/allure-2.25.0/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure report
        run: |
          # Copy previous history if available
          if [ -d "gh-pages/allure-history" ]; then
            echo "Copying Allure history..."
            cp -r gh-pages/allure-history allure-results/history
          fi

          # Generate report
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            allure generate allure-results --clean -o allure-report
            echo "Allure report generated successfully"
            
            # Add custom title
            if [ -f "allure-report/index.html" ]; then
              sed -i 's/<title>Allure Report<\/title>/<title>NocoDB E2E Test Report<\/title>/g' allure-report/index.html
              echo "Report title updated"
            fi

            # Backup history for next run
            mkdir -p allure-report/history
            cp -r allure-report/history gh-pages/allure-history/ 2>/dev/null || mkdir -p gh-pages/allure-history
            
          else
            echo "No test results found to generate report"
            mkdir -p allure-report
            cat > allure-report/index.html <<EOF
            <!DOCTYPE html>
            <html>
            <head><title>NocoDB E2E Test Report - No Results</title></head>
            <body>
              <h1>No Test Results Available</h1>
              <p>Environment: ${{ env.TEST_ENVIRONMENT }}</p>
              <p>Image Tag: ${{ env.IMAGE_TAG }}</p>
              <p>Run ID: ${{ github.run_id }}</p>
            </body>
            </html>
          EOF
          fi

      - name: Upload Allure artifacts
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: |
            allure-results/**
            allure-report/**

  deploy-allure-pages:
    runs-on: ubuntu-22.04
    needs: [allure-report, build-and-push]
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Allure report for Pages
        run: |
          # Create the _site directory for GitHub Pages
          mkdir -p _site

          # Copy the generated Allure report directly
          if [ -d "allure-artifacts/allure-report" ] && [ "$(ls -A allure-artifacts/allure-report)" ]; then
            echo "📊 Found Allure report, copying to _site..."
            cp -r allure-artifacts/allure-report/* _site/
            echo "✅ Allure report copied successfully"
            echo "Files in _site: $(ls -la _site/ | wc -l)"
          else
            echo "⚠️ No Allure report found in artifacts"
            echo "Available artifacts:"
            find allure-artifacts -type f 2>/dev/null || echo "No artifacts directory"
            
            # Create a simple index if no report exists
            cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><title>NocoDB Test Report - No Results</title></head>
          <body>
            <h1>No Test Results Available</h1>
            <p>Run ID: ${{ github.run_id }}</p>
            <p>No Allure report was generated for this run.</p>
          </body>
          </html>
          EOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Allure Report URL
        run: |
          echo "🎉 Allure report deployed successfully!"
          echo ""
          echo "📊 Allure Report URL:"
          echo "${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "🏷️ Image Tag: ${{ needs.build-and-push.outputs.image_tag || 'manual-run' }}"
